<!DOCTYPE html>
<html>
<head>
  <title>BucaOnline</title>
  <style>
    #chat {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 10px;
      display: flex;
      flex-direction: column-reverse; /* en yeni mesaj üstte */
    }
  </style>
</head>
<body>

<input id="username" placeholder="kullanıcı adı">
<input id="message" placeholder="mesaj">
<button onclick="sendMessage()">Gönder</button>

<div id="chat"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAqbYGSNuwx865xCNWUiHxtnaXd1WfLTsk",
  authDomain: "bucaonline-341a5.firebaseapp.com",
  databaseURL: "https://bucaonline-341a5-default-rtdb.firebaseio.com/",
  projectId: "bucaonline-341a5",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function sendMessage() {
  const user = document.getElementById("username").value;
  const msg = document.getElementById("message").value;
  if (!user || !msg) return; // boş mesaj göndermeyi engelle

  db.ref("messages").push({ user, msg });
  document.getElementById("message").value = ""; // mesajı temizle
}

db.ref("messages").on("child_added", (snapshot) => {
  const data = snapshot.val();
  const chatDiv = document.getElementById("chat");

  const p = document.createElement("p");
  p.innerHTML = `<b>${data.user}:</b> ${data.msg}`;

  chatDiv.prepend(p); // en üste ekle
});
</script>

</body>
</html>
