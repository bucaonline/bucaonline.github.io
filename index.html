<!DOCTYPE html>
<html>
<head>
  <title>BucaOnline</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topBar">
  BucaOnline
  <span id="settingsBtn">&#9881;</span>
  <div id="settingsMenu">
    <label for="themeToggle">Tema:</label>
    <button id="themeToggle">Koyu / Açık</button>
    <label for="newAvatar">Avatar:</label>
    <input type="text" id="newAvatar" placeholder="Yeni avatar URL">
    <button onclick="updateAvatar()">Güncelle</button>
    <label for="newName">Kullanıcı adı:</label>
    <input type="text" id="newName" placeholder="Yeni kullanıcı adı">
    <button onclick="updateUsername()">Güncelle</button>
  </div>
</div>

<div id="chat"></div>

<div id="inputArea">
  <input id="message" placeholder="Mesaj yaz...">
  <button class="sendBtn" onclick="sendMessage()">Gönder</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey:"AIzaSyAqbYGSNuwx865xCNWUiHxtnaXd1WfLTsk",
  authDomain:"bucaonline-341a5.firebaseapp.com",
  databaseURL:"https://bucaonline-341a5-default-rtdb.firebaseio.com/",
  projectId:"bucaonline-341a5"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let currentAvatar="";
let currentUsername="";

const settingsBtn=document.getElementById("settingsBtn");
const settingsMenu=document.getElementById("settingsMenu");
settingsBtn.onclick=()=>{ settingsMenu.classList.toggle("show"); settingsBtn.classList.toggle("rotate"); }

const themeToggle=document.getElementById("themeToggle");
themeToggle.onclick=()=>{
  const isLight=document.body.dataset.theme==="light";
  setTheme(isLight?"dark":"light");
  settingsBtn.style.color = isLight ? "#dcddde" : "#2f3136"; 
}

function setTheme(mode){
  if(mode==="light"){
    document.body.dataset.theme="light";
    document.body.style.backgroundColor="#f0f0f0";
    document.body.style.color="black";
    document.getElementById("chat").style.backgroundColor="#e0e0e0";
    document.getElementById("inputArea").style.backgroundColor="#d0d0d0";
    document.getElementById("message").style.backgroundColor="white";
    document.getElementById("message").style.color="black";
    document.getElementById("topBar").style.backgroundColor="#d0d0d0";
    document.getElementById("topBar").style.color="#2f3136";
    settingsBtn.style.color="#2f3136";
  }else{
    document.body.dataset.theme="dark";
    document.body.style.backgroundColor="#36393f";
    document.body.style.color="#dcddde";
    document.getElementById("chat").style.backgroundColor="#36393f";
    document.getElementById("inputArea").style.backgroundColor="#40444b";
    document.getElementById("message").style.backgroundColor="#303339";
    document.getElementById("message").style.color="#dcddde";
    document.getElementById("topBar").style.backgroundColor="#2f3136";
    document.getElementById("topBar").style.color="#7289da";
    settingsBtn.style.color="#dcddde";
  }
}

function updateAvatar(){const val=document.getElementById("newAvatar").value.trim();if(val) currentAvatar=val;document.getElementById("newAvatar").value="";}
function updateUsername(){const val=document.getElementById("newName").value.trim();if(val) currentUsername=val;document.getElementById("newName").value="";}

function sendMessage(){
  const msg=document.getElementById("message").value.trim();
  if(!msg) return;
  const user=currentUsername||"Anon";
  const avatar=currentAvatar||"";
  const timestamp=Date.now();
  db.ref("messages").push({user,msg,avatar,timestamp});
  document.getElementById("message").value="";
}
document.getElementById("message").addEventListener("keypress",e=>{if(e.key==="Enter") sendMessage();});

db.ref("messages").on("child_added",snapshot=>{
  const data=snapshot.val();
  const chatDiv=document.getElementById("chat");
  const div=document.createElement("div"); div.className="message";
  const date=new Date(data.timestamp); const hours=String(date.getHours()).padStart(2,'0'); const minutes=String(date.getMinutes()).padStart(2,'0');

  const defaultAvatar = `<div class="avatar">
    <svg viewBox="0 0 24 24">
      <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
    </svg>
  </div>`;

  const avatarContent = data.avatar ? `<img class="avatar" src="${data.avatar}" onerror="this.outerHTML='${defaultAvatar.replace(/"/g,'\\"')}'">` : defaultAvatar;

  div.innerHTML=`
    ${avatarContent}
    <div class="content">
      <span class="username">${data.user}</span>
      <span>${data.msg}</span>
      <span class="time">${hours}:${minutes}</span>
    </div>
  `;
  chatDiv.appendChild(div);
  chatDiv.scrollTop=chatDiv.scrollHeight;
});
</script>

</body>
</html>
