<!DOCTYPE html>
<html>
<head>
  <title>BucaOnline</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    #chat {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 10px;
      display: flex;
      flex-direction: column-reverse; /* yeni mesaj üstte */
    }
    .message {
      background: #f1f1f1;
      padding: 8px 12px;
      margin: 5px 0;
      border-radius: 8px;
      position: relative;
      max-width: 70%;
    }
    .username {
      font-weight: bold;
      margin-right: 5px;
    }
    .time {
      color: gray;
      font-size: 0.75em;
      position: absolute;
      right: 5px;
      bottom: 3px;
    }
    input, button {
      margin: 5px 0;
      padding: 5px;
    }
  </style>
</head>
<body>

<input id="username" placeholder="kullanıcı adı">
<input id="message" placeholder="mesaj">
<button onclick="sendMessage()">Gönder</button>

<div id="chat"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAqbYGSNuwx865xCNWUiHxtnaXd1WfLTsk",
  authDomain: "bucaonline-341a5.firebaseapp.com",
  databaseURL: "https://bucaonline-341a5-default-rtdb.firebaseio.com/",
  projectId: "bucaonline-341a5",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function sendMessage() {
  const user = document.getElementById("username").value.trim();
  const msg = document.getElementById("message").value.trim();
  if (!user || !msg) return;

  const timestamp = Date.now();
  db.ref("messages").push({ user, msg, timestamp });
  document.getElementById("message").value = "";
}

db.ref("messages").on("child_added", (snapshot) => {
  const data = snapshot.val();
  const chatDiv = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "message";

  const date = new Date(data.timestamp);
  const hours = String(date.getHours()).padStart(2, '0');
  const minutes = String(date.getMinutes()).padStart(2, '0');

  div.innerHTML = `<span class="username">${data.user}:</span> ${data.msg} <span class="time">${hours}:${minutes}</span>`;

  chatDiv.prepend(div); // en üste ekle
});
</script>

</body>
</html>
