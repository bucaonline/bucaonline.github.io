<!DOCTYPE html>
<html>
<head>
  <title>BucaOnline</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background-color: #36393f;
      color: #dcddde;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .message {
      display: flex;
      align-items: flex-start;
      background: #2f3136;
      padding: 8px 12px;
      border-radius: 8px;
      max-width: 70%;
      color: #dcddde;
      position: relative;
    }
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      margin-right: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .content {
      display: flex;
      flex-direction: column;
    }
    .username {
      font-weight: bold;
      color: #7289da;
      margin-bottom: 2px;
    }
    .time {
      color: #72767d;
      font-size: 0.75em;
      align-self: flex-end;
    }
    #inputArea {
      display: flex;
      padding: 10px;
      background: #40444b;
      gap: 5px;
    }
    #username, #message, #avatarURL {
      padding: 5px;
      border: 1px solid #202225;
      border-radius: 4px;
      background: #303339;
      color: #dcddde;
    }
    #message { flex: 3; }
    button {
      padding: 5px 10px;
      border-radius: 4px;
      border: none;
      background: #7289da;
      color: white;
      cursor: pointer;
    }
    button:hover { background: #5b6eae; }
    ::placeholder { color: #72767d; }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="username" placeholder="kullanıcı adı">
  <input id="avatarURL" placeholder="profil foto URL">
  <input id="message" placeholder="mesaj">
  <button onclick="sendMessage()">Gönder</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAqbYGSNuwx865xCNWUiHxtnaXd1WfLTsk",
  authDomain: "bucaonline-341a5.firebaseapp.com",
  databaseURL: "https://bucaonline-341a5-default-rtdb.firebaseio.com/",
  projectId: "bucaonline-341a5",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function sendMessage() {
  const user = document.getElementById("username").value.trim();
  const msg = document.getElementById("message").value.trim();
  const avatar = document.getElementById("avatarURL").value.trim() || "https://i.imgur.com/8Km9tLL.png";
  if (!user || !msg) return;

  const timestamp = Date.now();
  db.ref("messages").push({ user, msg, avatar, timestamp });
  document.getElementById("message").value = "";
}

db.ref("messages").on("child_added", snapshot => {
  const data = snapshot.val();
  const chatDiv = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "message";

  const date = new Date(data.timestamp);
  const hours = String(date.getHours()).padStart(2, '0');
  const minutes = String(date.getMinutes()).padStart(2, '0');

  div.innerHTML = `
    <img class="avatar" src="${data.avatar}" onerror="this.src='https://scontent.fadb3-2.fna.fbcdn.net/v/t1.30497-1/453178253_471506465671661_2781666950760530985_n.png?stp=cp0_dst-png_s32x32&_nc_cat=110&ccb=1-7&_nc_sid=136b72&_nc_ohc=bk47vAGNFjMQ7kNvwFEK4tM&_nc_oc=Adr1vaFWrpS8wi1zKH-yzkKotvyHIcQgWUMwugOXW2LaRICy-SyENXd72tlVgOgSpIc&_nc_zt=24&_nc_ht=scontent.fadb3-2.fna&_nc_ss=7a30f&oh=00_Afx9---DW0xHR4sKU9RMIWrio8mRxSjfVfZ55Qjp0OAXBw&oe=69E702FA'">
    <div class="content">
      <span class="username">${data.user}</span>
      <span>${data.msg}</span>
      <span class="time">${hours}:${minutes}</span>
    </div>
  `;

  chatDiv.appendChild(div);
  chatDiv.scrollTop = chatDiv.scrollHeight;
});
</script>

</body>
</html>
