<!DOCTYPE html>
<html>
<head>
  <title>BucaOnline</title>
  <style>
    #chat {
      height: 400px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 10px;
    }
    #chat p {
      margin: 5px 0;
    }
    .time {
      color: gray;
      font-size: 0.8em;
      margin-left: 5px;
    }
  </style>
</head>
<body>

<input id="username" placeholder="kullanıcı adı">
<input id="message" placeholder="mesaj">
<button onclick="sendMessage()">Gönder</button>

<div id="chat"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAqbYGSNuwx865xCNWUiHxtnaXd1WfLTsk",
  authDomain: "bucaonline-341a5.firebaseapp.com",
  databaseURL: "https://bucaonline-341a5-default-rtdb.firebaseio.com/",
  projectId: "bucaonline-341a5",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function sendMessage() {
  const user = document.getElementById("username").value.trim();
  const msg = document.getElementById("message").value.trim();
  if (!user || !msg) return; // boş mesaj engelle

  const timestamp = Date.now(); // zamanı al
  db.ref("messages").push({ user, msg, timestamp });
  document.getElementById("message").value = "";
}

db.ref("messages").on("child_added", (snapshot) => {
  const data = snapshot.val();
  const chatDiv = document.getElementById("chat");

  const p = document.createElement("p");

  // saat formatı: hh:mm
  const date = new Date(data.timestamp);
  const hours = String(date.getHours()).padStart(2, '0');
  const minutes = String(date.getMinutes()).padStart(2, '0');
  const time = `<span class="time">${hours}:${minutes}</span>`;

  p.innerHTML = `<b>${data.user}:</b> ${data.msg} ${time}`;

  // yeni mesaj en üste
  if (chatDiv.firstChild) {
    chatDiv.insertBefore(p, chatDiv.firstChild);
  } else {
    chatDiv.appendChild(p);
  }

  chatDiv.scrollTop = 0; // scroll hep en üstte
});
</script>

</body>
</html>
